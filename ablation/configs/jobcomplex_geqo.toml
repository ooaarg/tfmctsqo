name        = "jobcomplex-geqo"
description = "JOBComplex (GEQO): the 13 JOB-Complex queries with rels ≥ 12, GEQO baseline only."
sources     = ["jobcomplex"]

# JOB-Complex queries with rels >= 12.
queries = ["5", "8", "9", "11", "12", "13", "17", "19", "20", "21", "23", "25", "29"]

reward_modes     = ["neg_log"]
uct_aggregations = ["best"]
configs          = ["geqo"]
n_seeds          = 5

template_luby   = "ablation/mcts_luby.sql"
template_single = "ablation/mcts_single.sql"

[gucs.shared]
depth                = 4
top_k                = 5
patience             = 3
rollouts_per_leaf    = 1
exploration_constant = 1.41

[gucs.luby]
start_budget = 80
phases       = 5

[gucs.single]
