# wemake-python-styleguide config.  Ruff is the primary linter (see
# pyproject.toml); this is the stricter secondary pass before opening a PR.
#     uv run --project ablation flake8 ablation/

[flake8]
max-line-length = 100
min-name-length = 1
max-line-complexity = 30
max-cognitive-score = 30
max-cognitive-average = 30
max-local-variables = 30
max-arguments = 8
max-returns = 12
max-imports = 16
max-module-members = 30
max-jones-score = 20
exclude =
    .venv,
    __pycache__,
    configs,
    runs,
    bench,
    tests

# D1**:    missing-docstring spam in a research codebase.
# WPS305:  f-strings are the house style.
# WPS306:  plain `class Foo:` is fine.
# WPS226:  Streamlit code uses many small literals (button labels / keys).
# WPS115:  METRICS / METRIC_LABELS are module constants, not class attrs.
# WPS432:  UI sizes are inherently magic numbers.
# WPS602:  @staticmethod is fine.
# WPS323:  %-formatting only appears in plotly hover templates.
# WPS204:  re-reading `selected_run` / `cfg` repeatedly is fine.
# WPS210/213/214/231/237/221/202: streamlit dialogs are flat, linear scripts by design.
# WPS437:  lib._REWARD_SHORT / lib._TIMEOUT_RE are a deliberate internal API.
# WPS111/110: short names like `df`, `m`, `f` are pandas/regex idioms.
# WPS407:  module-level dicts/sets are conventional.
# WPS336:  multi-line string concat is sometimes clearer than f-string.
# WPS435:  `[None] * n` is Pythonic.
# WPS358:  `0.0` in pandas fillna is normal.
# WPS301:  matplotlib.pyplot dotted import is the conventional spelling.
# WPS420:  bare `pass` placeholders.
# WPS441:  control-var leak is the pandas iteration idiom.
# WPS229:  long try blocks in CLI error handling.
# WPS505/509: nested try / ternary, used sparingly.
# WPS234:  complex type annotations.
# WPS220:  deep nesting in streamlit dialogs.
# WPS504:  `if not df.empty: ... else: ...` reads naturally in pandas.
# WPS236:  pandas groupby returns 4+-tuples.
# W503:    PEP 8 disagrees with itself; we don't enforce.
ignore =
    D100, D101, D102, D103, D104, D105, D107,
    W503,
    WPS305, WPS306, WPS226, WPS115, WPS432, WPS602, WPS323,
    WPS204, WPS210, WPS213, WPS214, WPS231, WPS237, WPS221, WPS202,
    WPS437,
    WPS111, WPS110,
    WPS407, WPS336, WPS435, WPS358, WPS301, WPS420,
    WPS441, WPS229, WPS505, WPS509, WPS234, WPS220,
    WPS504, WPS236

per-file-ignores =
    app.py: WPS201, WPS235, WPS232, WPS421, E402, WPS430
    sweep.py: WPS201, WPS213, WPS232, E501, E402, WPS421, WPS430
    sharing.py: E402, WPS421
    lib.py: WPS437
    plot.py: WPS421, WPS232
